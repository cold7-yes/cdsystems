<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0e1a2b;
    --bg2:     #132035;
    --bg3:     #1a2a42;
    --border:  rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text:    #e8ede8;
    --muted:   #6b8a70;
    --accent:  #7abf3f;
    --cream:   #e8e4d8;
    --mono: "JetBrains Mono", monospace;
    --sans: "DM Sans", sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Diagonal hatching texture — toolbox vibe */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      -45deg,
      rgba(122,191,63,0.018) 0px,
      rgba(122,191,63,0.018) 1px,
      transparent 1px,
      transparent 12px
    );
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: "";
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(122,191,63,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* ── HEADER ── */
  header {
    padding: 48px 0 36px;
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 18px;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  .logo-wrap img {
    width: 52px;
    height: auto;
    display: block;
    filter: drop-shadow(0 0 6px rgba(122,191,63,0.5)) drop-shadow(0 0 12px rgba(13,51,85,0.4));
  }

  .badge-env {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: rgba(122,191,63,0.08);
    border: 1px solid rgba(122,191,63,0.22);
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  .title-row {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 10px;
  }

  h1 {
    font-family: var(--mono);
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--cream);
    line-height: 1;
  }

  h1 span { color: var(--accent); }

  /* Wrench icon inline with title */
  .title-icon {
    font-size: 28px;
    line-height: 1;
    filter: drop-shadow(0 0 4px rgba(122,191,63,0.3));
  }

  .welcome-msg {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.6;
    max-width: 520px;
  }

  /* ── TOOLBOX DIVIDER — decorative bolts ── */
  .bolt-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 0 0;
  }

  .bolt {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(122,191,63,0.25);
    border: 1px solid rgba(122,191,63,0.4);
    flex-shrink: 0;
  }

  .bolt-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px 0;
    flex-wrap: wrap;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px 9px 36px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: rgba(122,191,63,0.45); }
  input[type="text"]::placeholder { color: var(--muted); }

  .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }

  .pill {
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }

  .pill:hover { border-color: var(--border-hover); color: var(--text); }
  .pill.active { background: rgba(122,191,63,0.1); border-color: rgba(122,191,63,0.4); color: var(--accent); }

  /* ── STATS ── */
  .stats-row {
    display: flex;
    gap: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .stat { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
  .stat strong { font-family: var(--mono); color: var(--cream); font-size: 14px; }

  .stat-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  /* ── SECTION LABEL ── */
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 22px 0 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  
  .section-label::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    padding: 0 0 60px;
  }

  /* ── CARD ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  /* Corner bolt decorations */
  .card::before {
    content: "";
    position: absolute;
    top: 7px; left: 7px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(122,191,63,0.15);
    border: 1px solid rgba(122,191,63,0.25);
    transition: background 0.2s;
  }

  .card::after {
    content: "";
    position: absolute;
    top: 7px; right: 7px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(122,191,63,0.15);
    border: 1px solid rgba(122,191,63,0.25);
    transition: background 0.2s;
  }

  .card:hover {
    border-color: rgba(122,191,63,0.25);
    background: var(--bg3);
    transform: translateY(-2px);
  }

  .card:hover::before,
  .card:hover::after {
    background: rgba(122,191,63,0.35);
  }

  /* Bottom bolts */
  .card .bolt-br, .card .bolt-bl {
    position: absolute;
    bottom: 7px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(122,191,63,0.15);
    border: 1px solid rgba(122,191,63,0.25);
    transition: background 0.2s;
  }
  .card .bolt-br { right: 7px; }
  .card .bolt-bl { left: 7px; }
  .card:hover .bolt-br,
  .card:hover .bolt-bl { background: rgba(122,191,63,0.35); }

  /* Left accent per category */
  .card-accent {
    position: absolute;
    left: 0; top: 18%; bottom: 18%;
    width: 2px;
    border-radius: 0 2px 2px 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card.cat-job-setup .card-accent  { background: var(--accent); }
  .card.cat-proofing .card-accent   { background: #4a9fd4; }
  .card.cat-reporting .card-accent  { background: #d4824a; }
  .card.cat-agent .card-accent      { background: #c8b84a; }
  .card.cat-apps .card-accent       { background: #9a6ad4; }
  .card:hover .card-accent { opacity: 1; }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }

  .card-icon {
    width: 38px; height: 38px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
  }

  .icon-green  { background: rgba(122,191,63,0.12); border: 1px solid rgba(122,191,63,0.25); }
  .icon-blue   { background: rgba(74,159,212,0.12); border: 1px solid rgba(74,159,212,0.25); }
  .icon-orange { background: rgba(212,130,74,0.12); border: 1px solid rgba(212,130,74,0.25); }
  .icon-gold   { background: rgba(200,184,74,0.12); border: 1px solid rgba(200,184,74,0.25); }
  .icon-purple { background: rgba(154,106,212,0.12); border: 1px solid rgba(154,106,212,0.25); }

  .status-badge {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.06em; padding: 3px 9px;
    border-radius: 4px; text-transform: uppercase; flex-shrink: 0;
  }

  .status-live   { background: rgba(122,191,63,0.1); color: var(--accent); border: 1px solid rgba(122,191,63,0.3); }
  .status-beta   { background: rgba(200,184,74,0.1); color: #c8b84a; border: 1px solid rgba(200,184,74,0.3); }
  .status-coming { background: rgba(107,112,128,0.1); color: var(--muted); border: 1px solid var(--border); }
  .status-indev  { background: rgba(74,159,212,0.1); color: #4a9fd4; border: 1px solid rgba(74,159,212,0.3); }

  .card-title { font-size: 15px; font-weight: 600; color: var(--cream); margin-bottom: 6px; line-height: 1.3; }
  .card-desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }

  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }

  .tag {
    font-family: var(--mono); font-size: 10px;
    padding: 2px 8px; border-radius: 3px;
    background: rgba(13,51,85,0.6);
    border: 1px solid rgba(255,255,255,0.06);
    color: #7a9ab0; letter-spacing: 0.03em;
  }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 14px; border-top: 1px solid var(--border);
  }

  .doc-link {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--accent); text-decoration: none;
    font-family: var(--mono); letter-spacing: 0.02em; transition: opacity 0.15s;
  }

  .doc-link:hover { opacity: 0.7; }
  .card-meta { font-family: var(--mono); font-size: 10px; color: var(--muted); }

  /* ── EMPTY ── */
  .empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
  .empty span { display: block; font-size: 28px; margin-bottom: 10px; }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 20px 0;
    position: relative; z-index: 1;
  }

  .footer-inner { display: flex; align-items: center; justify-content: space-between; }
  .footer-brand { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--cream); }
  .footer-brand span { color: var(--accent); }
  .footer-note { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  @media (max-width: 600px) {
    h1 { font-size: 28px; }
    .grid { grid-template-columns: 1fr; }
    .footer-inner { flex-direction: column; gap: 8px; text-align: center; }
  }
</style>
</head>

  const CAT_LABELS = {
    all: "All tools & automations",

  let activeFilter = "all";

  const SOP_ICON = '<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M6 3H3a1 1 0 00-1 1v9a1 1 0 001 1h9a1 1 0 001-1v-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M9 2h5m0 0v5m0-5L8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  const STATUS_ORDER = { live: 0, beta: 1, indev: 2, coming: 3 };

  function renderCards(tools) {
    const grid = document.getElementById("cardGrid");
    grid.innerHTML = "";
    tools = [...tools].sort((a, b) => (STATUS_ORDER[a.status] ?? 9) - (STATUS_ORDER[b.status] ?? 9));
    tools.forEach(tool => {
      const statusClass = { live: "status-live", beta: "status-beta", coming: "status-coming", indev: "status-indev" }[tool.status] || "status-coming";
      const statusLabel = { live: "Live", beta: "Beta", coming: "Coming Soon", indev: "In Dev" }[tool.status] || "Coming Soon";
      const LAUNCH_ICON = '<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 8h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
      const launchHtml = tool.launchUrl
        ? '<a class="doc-link" href="' + tool.launchUrl + '" target="_blank" style="margin-left:10px;color:#4a9fd4;">' + LAUNCH_ICON + 'Launch</a>'
        : '';
      const sopHtml = tool.sopUrl
        ? '<a class="doc-link" href="#" onclick="openSOP(\'' + tool.sopUrl + '\', \'' + tool.title + '\'); return false;">' + SOP_ICON + 'View SOP</a>'
        : '<span class="doc-link" style="opacity:0.3;cursor:default;">' + SOP_ICON + 'SOP pending</span>';
      const tagsHtml = tool.tags.map(t => '<span class="tag">' + t + '</span>').join("");
      const card = document.createElement("div");
      card.className = "card cat-" + tool.category;
      card.dataset.category = tool.category;
      card.dataset.title = tool.title;
      card.dataset.status = tool.status;
      card.innerHTML =
        '<div class="card-accent"></div>' +
        '<div class="bolt-bl"></div>' +
        '<div class="bolt-br"></div>' +
        '<div class="card-header">' +
          '<div class="card-icon icon-' + tool.iconColor + '">' + (ICONS[tool.icon] || ICONS.doc) + '</div>' +
          '<span class="status-badge ' + statusClass + '">' + statusLabel + '</span>' +
        '</div>' +
        '<div class="card-title">' + tool.title + '</div>' +
        '<div class="card-desc">' + tool.desc + '</div>' +
        '<div class="card-tags">' + tagsHtml + '</div>' +
        '<div class="card-footer"><div style="display:flex;align-items:center;gap:12px;">' + sopHtml + launchHtml + '</div><span class="card-meta">' + (CAT_LABELS[tool.category] || tool.category) + '</span></div>';
      grid.appendChild(card);
    });
  }

  function filterCards() {
    const q = document.getElementById("searchInput").value.toLowerCase();
    const filtered = TOOLS.filter(tool => {
      const catMatch = activeFilter === "all" || tool.category === activeFilter;
      const textMatch = q === "" || tool.title.toLowerCase().includes(q) || tool.desc.toLowerCase().includes(q) || tool.tags.some(t => t.toLowerCase().includes(q));
      return catMatch && textMatch;
    });
    renderCards(filtered);
    if (filtered.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "Nothing found in the toolkit.";
      document.getElementById("cardGrid").appendChild(empty);
    }
    updateStats(filtered);
  }

  function setFilter(cat, el) {
    activeFilter = cat;
    document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
    el.classList.add("active");
    document.getElementById("sectionLabel").textContent = CAT_LABELS[cat] || cat;
    filterCards();
  }

  function updateStats(tools) {
    const list = tools !== undefined ? tools : TOOLS;
    document.getElementById("liveCount").textContent  = list.filter(t => t.status === "live").length;
    document.getElementById("betaCount").textContent  = list.filter(t => t.status === "beta").length;
    document.getElementById("indevCount").textContent = list.filter(t => t.status === "indev").length;
    document.getElementById("totalCount").textContent = list.length;
  }


  function openSOP(url, title) {
    document.getElementById('sopFrame').src = url;
    document.getElementById('sopModalTitle').textContent = title;
    document.getElementById('sopModal').style.display = 'block';
    document.body.style.overflow = 'hidden';
  }

  function closeSOP(e) {
    if (e && e.target !== document.getElementById('sopModal')) return;
    document.getElementById('sopModal').style.display = 'none';
    document.getElementById('sopFrame').src = '';
    document.body.style.overflow = '';
  }

  renderCards(TOOLS);
  updateStats();
</script>
</body>
</html>
